[env:esp32_32e_display]
platform = espressif32@7.0.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = huge_app.csv
extra_scripts = pre:scripts/remove_lvgl_arm_asm.py
build_src_filter =
    +<*>

lib_deps =
    lvgl/lvgl
    bblanchon/ArduinoJson
    adafruit/Adafruit NeoPixel
    knolleary/PubSubClient

build_flags =
    -I include
    -O2
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_CONF_PATH=\"lv_conf.h\"
    -DCORE_DEBUG_LEVEL=3
    -DSUPERNOVA_MQTT_HOST=\"CHANGE_ME_BROKER_IP\"
    -DSUPERNOVA_MQTT_PORT=1883
